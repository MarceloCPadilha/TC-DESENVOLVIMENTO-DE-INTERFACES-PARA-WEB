<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho</title>
    <link rel="stylesheet" href="../style/style-header-logado.css">
    <link rel="stylesheet" href="../style/style-carrinho.css">
</head>
<body>

    <header class="topo">
        <div class="logo">
            <img src="../img/image.png" alt="">
        </div>

        <nav>
            <ul class="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="">Sobre nós</a></li>
                <li><a href="">Info</a></li>
            </ul>
        </nav>

        <div class="bt">
            ROBERTO
            <ul class="dropdown">
                <li><a href="usuario.html">Perfil</a></li>
                <li><a href="carrinho.html">Carrinho</a></li>
                <li><a href="index.html">LOG OUT</a></li>
            </ul>
        </div>
    </header>

    <main class="container">

        <h1>Meu Carrinho</h1>

        <div class="carrinho">

            <div class="produto">
                <img src="../img/produto.png" alt="Produto">
                <div class="info">
                    <h3>Produto Exemplo</h3>
                    <p>Quantidade: 1</p>
                </div>
                <span class="preco">R$ 99,90</span>
            </div>

            <div class="produto">
                <img src="../img/produto.png" alt="Produto">
                <div class="info">
                    <h3>Outro Produto</h3>
                    <p>Quantidade: 2</p>
                </div>
                <span class="preco">R$ 59,90</span>
            </div>

            <div class="total">
                <h2>Total: R$ 159,80</h2>
            </div>

            <div class="botoes">
                <a href="catalogo.html" class="btn">Continuar Comprando</a>
                <a href="#" class="btn finalizar">Finalizar Compra</a>
            </div>

        </div>

    </main>

</body>
</html>
