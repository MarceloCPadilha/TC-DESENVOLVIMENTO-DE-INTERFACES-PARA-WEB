<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style/login-cadastro.css">
</head>
<body>

    <div class="div-principal">
        <div class="cobrir esquerda">
            <h1></h1>
            <button class="mudar-btn">Cadastrar</button>
        </div>
        <div class="login">
            <form action="login-form">
                <label for="email-login">Email: </label>
                <input type="email" name="email-login" id="email-login" required>
                <label for="password-login">Senha: </label>
                <input type="password" name="password-login" id="password-login" required>
                <button type="submit">Login</button>
            </form>
        </div>
        <div class="cadastro">
            <form action="cadastro-form"></form>
        </div>
    </div>


    <script src="../js/login-cadastro.js"></script>
    
</body>
</html>
